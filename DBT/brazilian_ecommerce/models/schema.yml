
version: 1

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: order_status
        tests:
          - accepted_values:
              values: [
                'processing'
                ,'delivered'
                ,'invoiced'
                ,'canceled'
                ,'shipped'
                ,'unavailable'
                ,'created'
                ,'approved'
              ]

  - name: fact_sales
    columns:
      - name: order_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id
